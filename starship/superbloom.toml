"$schema" = 'https://starship.rs/config-schema.json'

# Superbloom — Starship prompt theme (minimal). Requires a Nerd Font.
# Install: cp starship/superbloom.toml ~/.config/starship.toml
# (or copy just [palettes.superbloom] into your config to recolor it)

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$cmd_duration\
$character\
"""

add_newline = true
palette = "superbloom"

[palettes.superbloom]
base = '#142018'
surface = '#1b2a20'
overlay = '#26382b'
muted = '#81917d'
subtle = '#adbaa6'
text = '#e5eadf'
poppy = '#e69a4f'
gold = '#e2c583'
cream = '#e6d8c8'
sage = '#92ad8b'
sea = '#9ac6a6'
phacelia = '#7fbf9e'
sky = '#8fbfdc'
brodiaea = '#88a9e6'
lupine = '#b6a6d5'
clarkia = '#e09aaa'
paintbrush = '#c96f8d'

[directory]
style = "bold fg:sky"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 0
truncate_to_repo = false
read_only = " 󰌾"
read_only_style = "fg:paintbrush"

[git_branch]
style = "fg:phacelia"
format = "[$symbol$branch]($style) "
symbol = " "

[git_state]
style = "fg:paintbrush"
format = '[\($state( $progress_current/$progress_total)\)]($style) '

# Single dirty-tree indicator, not a per-status breakdown — lazygit is for
# "what changed". modified/staged/renamed/deleted/untracked render as a
# zero-width space, so the literal "*" they wrap only appears when one of
# them is true (borrowed from starship's pure-preset).
[git_status]
style = "fg:gold"
format = '([$conflicted]($style)[(*$untracked$modified$staged$renamed$deleted)]($style)[$ahead_behind]($style) )'
conflicted = "!"
untracked = "​"
modified = "​"
staged = "​"
renamed = "​"
deleted = "​"
stashed = ""
ahead = "⇡"
behind = "⇣"
diverged = "⇕"

# Venv name only, no interpreter version — detection by project files is
# disabled so this only shows when a venv is actually active.
[python]
style = "fg:lupine"
format = '[(\($virtualenv\))]($style) '
detect_extensions = []
detect_files = []
detect_folders = []

[cmd_duration]
style = "fg:muted"
format = "[$duration]($style) "

[character]
format = "$symbol "
success_symbol = "[❯](bold fg:poppy)"
error_symbol = "[❯](bold fg:paintbrush)"
vimcmd_symbol = "[❮](bold fg:sage)"
